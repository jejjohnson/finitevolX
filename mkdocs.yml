site_name: finitevolX
site_description: Finite volume operators for JAX on Arakawa C-grids
site_author: Juan Emmanuel Johnson, Takaya Uchida
repo_url: https://github.com/jejjohnson/finitevolX
repo_name: jejjohnson/finitevolX

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            preload_modules:
              - spectraldiffx
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - C-Grid Discretization: cgrid_discretization.md
  - Multilayer vs. 3D: multilayer_vs_3d.md
  - Masks: masks.md
  - Raw Stencils:
      - Theory & Overview: stencils.md
      - API Reference: api/stencils.md
  - Difference Operators:
      - Theory & Overview: difference.md
      - API Reference: api/difference.md
  - Interpolation Operators:
      - Theory & Overview: interpolation.md
      - API Reference: api/interpolation.md
  - Advection:
      - Theory & Overview: advection.md
      - API Reference: api/advection.md
      - Reconstruction: api/reconstruction.md
  - Boundary Conditions:
      - Theory & Overview: boundary_conditions.md
      - API Reference: api/boundary_conditions.md
  - Spatial Operators:
      - Theory & Overview: spatial_operators.md
      - Divergence: api/divergence.md
      - Vorticity: api/vorticity.md
      - Diffusion: api/diffusion.md
      - Coriolis: api/coriolis.md
      - Momentum Advection: api/momentum.md
      - Diagnostics: api/diagnostics.md
  - Time Integration:
      - Theory & Overview: time_integration.md
      - Usage Guide: time_integration_usage.md
      - API Reference: api/time_integration.md
  - Elliptic Solvers:
      - Theory & Overview: elliptic_solvers.md
      - Usage Guide: elliptic_solvers_usage.md
      - API Reference: api/elliptic.md
  - Multigrid Solver:
      - Theory & Overview: multigrid_solver.md
      - Usage Guide: multigrid_solver_usage.md
      - API Reference: api/multigrid.md
  - Solver Comparison: solver_comparison.md
  - Examples: examples.md
  - API Reference:
      - Overview & Grids: api/index.md
      - Raw Stencils: api/stencils.md
      - Difference: api/difference.md
      - Interpolation: api/interpolation.md
      - Advection: api/advection.md
      - Reconstruction: api/reconstruction.md
      - Vorticity: api/vorticity.md
      - Diffusion: api/diffusion.md
      - Divergence: api/divergence.md
      - Coriolis: api/coriolis.md
      - Momentum Advection: api/momentum.md
      - Boundary Conditions: api/boundary_conditions.md
      - Diagnostics: api/diagnostics.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets:
      base_path: ['.']
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
