site_name: finitevolX
site_description: Finite volume operators for JAX on Arakawa C-grids
site_author: Juan Emmanuel Johnson, Takaya Uchida
repo_url: https://github.com/jejjohnson/finitevolX
repo_name: jejjohnson/finitevolX

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - C-Grid Discretization: cgrid_discretization.md
  - Examples: examples.md
  - API Reference:
      - Overview & Grids: api/index.md
      - Difference: api/difference.md
      - Interpolation: api/interpolation.md
      - Advection: api/advection.md
      - Reconstruction: api/reconstruction.md
      - Vorticity: api/vorticity.md
      - Diffusion: api/diffusion.md
      - Divergence: api/divergence.md
      - Coriolis: api/coriolis.md
      - Momentum Advection: api/momentum.md
      - Boundary Conditions: api/boundary_conditions.md
      - Elliptic Solvers: api/elliptic.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets:
      base_path: ['.']
  - attr_list
  - md_in_html
